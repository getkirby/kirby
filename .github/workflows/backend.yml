# To upgrade pinned actions: Use https://github.com/mheap/pin-github-action

name: CI - Backend
on:
  push:
    branches-ignore:
      - "main"
      - "release/**"
    paths:
      - "**"
      - "!.github/**"
      - ".github/workflows/backend.yml"
      - "!.tx/**"
      - "!.vscode/**"
      - "!assets/**"
      - "!panel/**"
      - "!scripts/**"
  pull_request:
    branches-ignore:
      - "main"
      - "release/**"
    paths:
      - "**"
      - "!.github/**"
      - ".github/workflows/backend.yml"
      - "!.tx/**"
      - "!.vscode/**"
      - "!assets/**"
      - "!panel/**"
      - "!scripts/**"
  workflow_call:

  workflow_dispatch:

jobs:
  tests:
    name: "Unit tests - PHP ${{ matrix.php }}"

    # run job only under the following conditions:
    # - can be triggered manually from any repository
    # - if on pull request, only run if from a fork
    #   (our own repo is covered by the push event)
    # - if on push, only run CI automatically for the
    #   main getkirby/kirby repo and for forks
    if: >
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'pull_request' &&
        github.event.pull_request.head.repo.full_name != github.repository
      ) ||
      (
        github.event_name == 'push' &&
        (github.repository == 'getkirby/kirby' || github.repository_owner != 'getkirby')
      )

    runs-on: ubuntu-22.04
    timeout-minutes: 5
    strategy:
      matrix:
        php: ["8.2", "8.3", "8.4", "8.5"]
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
      memcached:
        image: memcached:latest
        ports:
          - 11211:11211
    env:
      extensions: mbstring, ctype, curl, gd, apcu, memcached, redis
      ini: 'apc.enabled=1, apc.enable_cli=1, pcov.directory=., pcov.exclude="~(vendor|tests)~"'

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 2

      - name: Preparations
        run: mkdir sarif

      - name: Install system locales
        run: sudo apt-get update && sudo apt-get install -y locales-all

      - name: Setup PHP cache environment
        id: ext-cache
        uses: shivammathur/cache-extensions@256729b5fef535345e27904657f78048c0990f81 # v1
        with:
          php-version: ${{ matrix.php }}
          extensions: ${{ env.extensions }}
          key: php-v1

      - name: Cache PHP extensions
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ${{ steps.ext-cache.outputs.dir }}
          key: ${{ steps.ext-cache.outputs.key }}

      - name: Setup PHP environment
        uses: shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc # v2
        with:
          php-version: ${{ matrix.php }}
          extensions: ${{ env.extensions }}
          ini-values: ${{ env.ini }}
          coverage: pcov
          tools: composer:2.9.8

      - name: Cache composer global
        id: composer-global-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.composer/vendor
          key: composer-global-cpx-1.0.4-${{ runner.os }}

      - name: Install cpx
        if: steps.composer-global-cache.outputs.cache-hit != 'true'
        run: composer global require cpx/cpx:1.0.4

      - name: Ensure cpx cache dir exists
        run: mkdir -p ~/.cpx

      - name: Cache cpx tools
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.cpx
          key: cpx-${{ runner.os }}-${{ hashFiles('composer.json') }}
          restore-keys: cpx-${{ runner.os }}-

      - name: Setup problem matchers
        run: |
          echo "::add-matcher::${{ runner.tool_cache }}/php.json"
          echo "::add-matcher::${{ runner.tool_cache }}/phpunit.json"

      - name: Cache analysis data
        id: finishPrepare
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.cache/psalm
          key: backend-analysis-${{ matrix.php }}

      - name: Check Composer platform requirements
        if: always() && steps.finishPrepare.outcome == 'success'
        run: composer check-platform-reqs

      - name: Run tests
        if: always() && steps.finishPrepare.outcome == 'success'
        run: composer run test -- --configuration phpunit.ci.xml --coverage-clover ${{ github.workspace }}/clover.xml

      - name: Statically analyze using Psalm
        if: always() && steps.finishPrepare.outcome == 'success' && matrix.php != '8.5'
        run: composer run analyze:psalm -- --output-format=github --php-version=${{ matrix.php }} --report=sarif/psalm.sarif --report-show-info=false --force-jit

      - name: Upload coverage results to Codecov
        env:
          token: ${{ secrets.CODECOV_TOKEN }}
          PHP: ${{ matrix.php }}
        if: env.token != ''
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }} # for better reliability if the GitHub API is down
          fail_ci_if_error: true
          files: ${{ github.workspace }}/clover.xml
          flags: backend
          env_vars: PHP

      - name: Upload code scanning results to GitHub
        if: always() && steps.finishPrepare.outcome == 'success' && github.repository == 'getkirby/kirby' && matrix.php != '8.5'
        uses: github/codeql-action/upload-sarif@68bde559dea0fdcac2102bfdf6230c5f70eb485e # v4
        with:
          sarif_file: sarif

  analysis:
    name: "Code Quality"

    # run job only under the following conditions:
    # - can be triggered manually from any repository
    # - if on pull request, only run if from a fork
    #   (our own repo is covered by the push event)
    # - if on push, only run CI automatically for the
    #   main getkirby/kirby repo and for forks
    if: >
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'pull_request' &&
        github.event.pull_request.head.repo.full_name != github.repository
      ) ||
      (
        github.event_name == 'push' &&
        (github.repository == 'getkirby/kirby' || github.repository_owner != 'getkirby')
      )

    runs-on: ubuntu-22.04
    timeout-minutes: 5
    env:
      php: "8.2"
      extensions: mbstring, ctype, curl, gd, apcu, memcached, redis

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Preparations
        run: mkdir sarif

      - name: Setup PHP cache environment
        id: ext-cache
        uses: shivammathur/cache-extensions@256729b5fef535345e27904657f78048c0990f81 # v1
        with:
          php-version: ${{ env.php }}
          extensions: ${{ env.extensions }}
          key: php-analysis-v1

      - name: Cache PHP extensions
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ${{ steps.ext-cache.outputs.dir }}
          key: ${{ steps.ext-cache.outputs.key }}

      - name: Setup PHP environment
        id: finishPrepare
        uses: shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc # v2
        with:
          php-version: ${{ env.php }}
          extensions: ${{ env.extensions }}
          coverage: none
          tools: composer:2.9.8, composer-normalize:2.52.0, phpmd:2.15.0

      - name: Cache composer global
        id: composer-global-cache
        if: always() && steps.finishPrepare.outcome == 'success'
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.composer/vendor
          key: composer-global-cpx-1.0.4-${{ runner.os }}

      - name: Install cpx
        if: always() && steps.finishPrepare.outcome == 'success' && steps.composer-global-cache.outputs.cache-hit != 'true'
        run: composer global require cpx/cpx:1.0.4

      - name: Ensure cpx cache dir exists
        if: always() && steps.finishPrepare.outcome == 'success'
        run: mkdir -p ~/.cpx

      - name: Cache cpx tools
        if: always() && steps.finishPrepare.outcome == 'success'
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.cpx
          key: cpx-${{ runner.os }}-${{ hashFiles('composer.json') }}
          restore-keys: cpx-${{ runner.os }}-

      - name: Validate composer.json/composer.lock
        if: always() && steps.finishPrepare.outcome == 'success'
        run: composer run analyze:composer

      - name: Ensure that composer.json is normalized
        if: always() && steps.finishPrepare.outcome == 'success'
        env:
          GITHUB_TOKEN: ""
        run: composer-normalize --dry-run

      - name: Check for unused Composer dependencies
        if: always() && steps.finishPrepare.outcome == 'success'
        run: composer run analyze:composer:unused

      - name: Statically analyze using PHPMD
        if: always() && steps.finishPrepare.outcome == 'success'
        run: phpmd . github phpmd.xml.dist --exclude 'dependencies/*,tests/*,vendor/*' --reportfile-sarif sarif/phpmd.sarif

      - name: Upload code scanning results to GitHub
        if: always() && steps.finishPrepare.outcome == 'success' && github.repository == 'getkirby/kirby'
        uses: github/codeql-action/upload-sarif@68bde559dea0fdcac2102bfdf6230c5f70eb485e # v4
        with:
          sarif_file: sarif

  coding-style:
    name: "Coding Style"

    # run job only under the following conditions:
    # - can be triggered manually from any repository
    # - if on pull request, only run if from a fork
    #   (our own repo is covered by the push event)
    # - if on push, only run CI automatically for the
    #   main getkirby/kirby repo and for forks
    if: >
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'pull_request' &&
        github.event.pull_request.head.repo.full_name != github.repository
      ) ||
      (
        github.event_name == 'push' &&
        (github.repository == 'getkirby/kirby' || github.repository_owner != 'getkirby')
      )

    runs-on: ubuntu-22.04
    timeout-minutes: 5
    env:
      php: "8.2"

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup PHP environment
        uses: shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc # v2
        with:
          php-version: ${{ env.php }}
          coverage: none
          tools: composer:2.9.8

      - name: Cache composer global
        id: composer-global-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.composer/vendor
          key: composer-global-cpx-1.0.4-${{ runner.os }}

      - name: Install cpx
        if: steps.composer-global-cache.outputs.cache-hit != 'true'
        run: composer global require cpx/cpx:1.0.4

      - name: Ensure cpx cache dir exists
        run: mkdir -p ~/.cpx

      - name: Cache cpx tools
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.cpx
          key: cpx-${{ runner.os }}-${{ hashFiles('composer.json') }}
          restore-keys: cpx-${{ runner.os }}-

      - name: Cache analysis data
        id: finishPrepare
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.php-cs-fixer
          key: coding-style-${{ hashFiles('.php-cs-fixer.dist.php') }}
          restore-keys: coding-style-

      - name: Check for PHP coding style violations
        if: always() && steps.finishPrepare.outcome == 'success'
        run: composer run fix -- --diff --dry-run
