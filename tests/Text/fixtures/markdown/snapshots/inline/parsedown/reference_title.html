[double quotes] and [single quotes] and [parentheses]<br />
<br />
[double quotes]: <a href="http://example.com">http://example.com</a> "example title"<br />
[single quotes]: <a href="http://example.com">http://example.com</a> 'example title'<br />
[parentheses]: <a href="http://example.com">http://example.com</a> (example title)<br />
[invalid title]: <a href="http://example.com">http://example.com</a> example title
